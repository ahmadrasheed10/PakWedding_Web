name: PakWedding CI Pipeline

# This tells GitHub WHEN to run the robot
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# This tells GitHub WHAT the robot should do
jobs:
  build-and-test:
    runs-on: ubuntu-latest # The robot is a free Ubuntu computer provided by GitHub

    steps:
    - name: 1. Download the code from the repository
      uses: actions/checkout@v3

    - name: 2. Set up Docker Buildx (Docker's build tool)
      uses: docker/setup-buildx-action@v2

    - name: 3. Try to build the Backend Docker Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: false # We are just testing if it builds, not pushing it anywhere yet
        tags: pakwedding-backend:test

    - name: 4. Try to build the Frontend Docker Image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: false
        tags: pakwedding-frontend:test

    - name: 5. Success Message
      run: echo "🎉 Both Backend and Frontend Docker containers built successfully!"
